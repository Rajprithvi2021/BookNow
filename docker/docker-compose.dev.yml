version: '3.8'

# Development Docker Compose Configuration
# Use this for local development with hot reload and debugging

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: booknow-db-dev
    environment:
      POSTGRES_USER: ${DB_USER:-booknow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-booknow_secure_pass_123}
      POSTGRES_DB: ${DB_NAME:-booknow}
      POSTGRES_INITDB_ARGS: "-c timezone=UTC"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-booknow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - booknow-dev
    restart: unless-stopped

  # Backend API (with hot reload)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: booknow-backend-dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-booknow}:${DB_PASSWORD:-booknow_secure_pass_123}@db:5432/${DB_NAME:-booknow}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      FRONTEND_URL: http://localhost:3000
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      DEBUG: "True"
    volumes:
      - ../backend/src:/app/src
      - ../backend/scripts:/app/scripts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - booknow-dev
    restart: unless-stopped
    command: >
      sh -c "python -m scripts.seed_db && 
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend (with hot reload)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    container_name: booknow-frontend-dev
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NODE_ENV: development
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - booknow-dev
    restart: unless-stopped

  # PostgreSQL Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: booknow-pgadmin-dev
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@booknow.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - booknow-dev
    restart: unless-stopped

networks:
  booknow-dev:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
