version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: booknow-postgres
    environment:
      POSTGRES_USER: appointments_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: appointments_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointments_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - booknow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booknow-backend
    environment:
      DATABASE_URL: postgresql://appointments_user:secure_password@postgres:5432/appointments_db
      API_HOST: 0.0.0.0
      API_PORT: 8000
      FRONTEND_URL: http://localhost:3000
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - booknow-network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booknow-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - booknow-network
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:

networks:
  booknow-network:
    driver: bridge
